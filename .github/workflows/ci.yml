name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Server — TypeScript + Hono 后端
  # ============================================================
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    services:
      postgres:
        image: postgres:16.14
        env:
          POSTGRES_DB: mealmate
          POSTGRES_USER: mealmate
          POSTGRES_PASSWORD: mealmate_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mealmate -d mealmate"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:unit
        env:
          NODE_ENV: test

      - name: Integration tests
        run: pnpm test:integration
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: mealmate
          DB_USER: mealmate
          DB_PASSWORD: mealmate_test

  # ============================================================
  # App — Android Kotlin + Compose
  # ============================================================
  app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: ktlint check
        run: ./gradlew ktlintCheck

      - name: detekt
        run: ./gradlew detekt

      - name: Lint (Android)
        run: ./gradlew :app:lintDebug

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest

  # ============================================================
  # Docker Compose — 编排语法验证 + 镜像构建
  # ============================================================
  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create dummy .env for Compose validation
        run: |
          printf '%s\n' \
            'DB_NAME=mealmate' \
            'DB_USER=mealmate' \
            'MEALMATE_DB_PASSWORD_FILE=/dev/null' \
            'MEALMATE_BOOTSTRAP_SECRET_FILE=/dev/null' \
            'MEALMATE_MODELS_FILE=/dev/null' \
            'MEALMATE_PUBLIC_DOMAIN=localhost' \
            > .env

      - name: Validate Compose config (production)
        run: docker compose -f docker-compose.yml config --quiet

      - name: Validate Compose config (test overlay)
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml config --quiet

      - name: Build migrate image
        run: docker compose -f docker-compose.yml build migrate

      - name: Build app image
        run: docker compose -f docker-compose.yml build app
